## Tells Render exactly how to build and run Atlas app

services:
  -type: web
   name: atlas-travel-assistant
   runtime: python
   buildCommand: pip install -r requirements.txt
   startCommand: uvicorn main:app ==host 0.0.0.0 --port  $PORT
   envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: OPENWEATHER_API_KEY
        sync: false
      - key: EXCHANGERATE_API_KEY
        sync: false